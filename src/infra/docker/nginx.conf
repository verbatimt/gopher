# Gopher web front (gopher.local). Serves the Flutter web bundle and reverse-proxies
# /api, /ws, and /health to the API over the internal bridge — so the browser only ever
# talks to gopher.local (same-origin; the httpOnly refresh cookie stays first-party over
# plain HTTP, no CORS, no TLS).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web emits stable filenames; revalidate every response (cheap via ETag) so a
    # redeploy is always picked up.
    add_header Cache-Control "no-cache" always;

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # --- API (same-origin) ---
    location /api/ {
        proxy_pass http://gopher-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health + metrics (diagnostics) ---
    location = /health {
        proxy_pass http://gopher-api:3000/health;
        proxy_set_header Host $host;
    }
    location = /metrics {
        proxy_pass http://gopher-api:3000/metrics;
        proxy_set_header Host $host;
    }

    # --- WebSocket (real-time) ---
    location /ws {
        proxy_pass http://gopher-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
}
