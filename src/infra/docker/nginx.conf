# Gopher web front (gopher.local). Serves the Flutter web bundle and reverse-proxies
# /api, /ws, and /health to the API over the internal bridge — so the browser only ever
# talks to gopher.local (same-origin; the httpOnly refresh cookie stays first-party over
# plain HTTP, no CORS, no TLS).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache-busting strategy (per Flutter web "configure your cache headers" guidance):
    #   - The entrypoints + service worker + version.json must always revalidate so a redeploy
    #     loads the new bundle (and the new serviceWorkerVersion) without a manual cache clear.
    #   - App scripts/wasm/json keep stable filenames per build, so they revalidate too.
    #   - Only the SDK-versioned CanvasKit payload is truly immutable → long-cache it.
    #   - Media/fonts/icons get a modest browser cache.
    # nginx location precedence: exact (=) > prefix (^~) > regex (~*) > prefix (/).

    # SPA fallback for client-side (hash) routes — never cache the shell.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Entrypoints + service worker + version: always revalidate (no-store).
    location = /index.html              { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
    location = /flutter_bootstrap.js    { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
    location = /flutter.js              { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
    location = /main.dart.js            { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }
    location = /version.json            { add_header Cache-Control "no-cache, no-store, must-revalidate" always; }

    # CanvasKit is versioned by the Flutter SDK → safe to cache forever.
    location ^~ /canvaskit/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Other app scripts/wasm/json (e.g. AssetManifest.json) keep stable names → revalidate.
    location ~* \.(?:js|mjs|wasm|json)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Media + fonts + icons: modest browser cache (filenames are stable but rarely change).
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico|ttf|otf|woff2?)$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # --- API (same-origin) ---
    location /api/ {
        proxy_pass http://gopher-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health + metrics (diagnostics) ---
    location = /health {
        proxy_pass http://gopher-api:3000/health;
        proxy_set_header Host $host;
    }
    location = /metrics {
        proxy_pass http://gopher-api:3000/metrics;
        proxy_set_header Host $host;
    }

    # --- WebSocket (real-time) ---
    location /ws {
        proxy_pass http://gopher-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
}
